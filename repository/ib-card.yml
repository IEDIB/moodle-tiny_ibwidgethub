key: ib-card
name: Targeta
category: bootstrap
instructions: >
  Emprau la targeta juntament amb grup de targetes per mostrar aplicacions
  pràctiques

  d'una situació d'aprenentatge. Emprau el <b>menú contextual</b> per canviar la
  imatge.
template: >
  <p><br></p> <div class="ib-card m-auto{{#flip}} ib-card-flip{{/flip}}"
  style="width:{{width}}px;"> <div class="ib-card-inner"
  {{#if}}[flip||(!flip&&forceHeight)] style="height:{{height}}px;"{{/if}}>
    <div class="ib-card-front {{bgFront}}" data-face="front" {{#if}}[!flip&&!forceHeight] style="position:relative;"{{/if}}>
      {{#hasImg}}<img src="{{imgTop}}" class="card-img-top" alt="Imatge targeta">{{/hasImg}}
      {{#header}}<div class="card-header">Capçalera de targeta</div>{{/header}}
      <div class="card-body" {{#if}}[flip||(!flip&&forceHeight)] style="height: calc({{height}}px - 100px);"{{/if}}>
        <h5 class="card-title">Títol targeta</h5>
        <p class="card-text">Text del contingut de la targeta.</p>
      </div>
      {{#footer}}<div class="card-footer">Peu de targeta</div>{{/footer}}
    </div>
    {{#flip}}
    <div class="ib-card-back {{bgBack}}" data-face="back">
      <div class="card-body">
        <h5 class="card-title">Títol revers targeta</h5>
        <p class="card-text">Text del revers de la targeta.</p>
      </div>
    </div>
    {{/flip}}
  </div> </div> <p><br></p>
selectors: div.ib-card
bubbles: ib-card-group
parameters:
  - name: width
    title: Amplada en px
    bind: styleRegex('width:(.*)px')
    value: 250
    type: numeric
    min: 100
  - name: forceHeight
    title: Forçar una altura fixada
    value: false
    type: checkbox
    when: '!flip'
    bind:
      getValue: |
        function(elem) {
          var cardInner = elem.querySelector('.ib-card-inner');
          return cardInner && cardInner.style.height !== '';
        }
      setValue: function() {}
  - name: height
    title: Altura en px
    value: 350
    type: numeric
    min: 100
    when: forceHeight || flip
    bind:
      getValue: |
        function(elem) {
          return parseInt(elem.querySelector('.ib-card-inner')?.style?.height ?? '350');
        }
      setValue: |
        function(elem, v, vm, util) {
          var fh = vm['forceHeight'] || vm['flip'];
          var cih = '';
          var cfh = '';
          var ibCardFront = elem.querySelector('.ib-card-front');
          var ibCardInner = elem.querySelector('.ib-card-inner');
          var ibCardBody = elem.querySelector('.ib-card-front .card-body');
          if (fh) {
            cih = v + 'px';
            cfh = 'calc(' + v + 'px - 100px)';
            util.setStyleMCE(ibCardFront, 'position', '');
          } else {
            util.setStyleMCE(ibCardFront, 'position', 'relative');
          }
          util.setStyleMCE(ibCardInner, 'height', cih);
          util.setStyleMCE(ibCardBody, 'height', cfh);
        }
  - name: hasImg
    title: Té imatge
    type: checkbox
    value: true
    bind:
      getValue: |
        function(elem) {return elem.querySelector('.ib-card-front img.card-img-top') !== null;}
      setValue: |
        function(elem, v) {
          if (v) {
            if (elem.querySelector('.ib-card-front img.card-img-top')) {
              return;
            }
            var img = '<img src="https://picsum.photos/300/100" class="card-img-top" alt="Imatge targeta">';
            elem.querySelector('.ib-card-front')?.insertAdjacentHTML('afterbegin', img);
          } else {
            var imgEl = elem.querySelector('.ib-card-front img.card-img-top');
            if (imgEl) { imgEl.remove(); }
          }
        }
  - name: imgTop
    title: Imatge
    bind: attr('src', 'img.card-img-top')
    type: image
    when: hasImg
    value: https://picsum.photos/300/100
  - name: header
    title: Té capçalera
    type: checkbox
    value: false
    bind:
      getValue: |
        function(elem) {return elem.querySelector('.ib-card-front div.card-header') !== null;}
      setValue: |
        function(elem, v) {
          if (v) {
            if(elem.querySelector('.ib-card-front div.card-header')) {
              return;
            }
            var imgtop = elem.querySelector('.ib-card-front img.card-img-top');
            var header = '<div class="card-header">Capçalera de targeta</div>';
            if (imgtop) {
              imgtop.insertAdjacentHTML('afterend', header);
            } else {
              elem.querySelector('.ib-card-front')?.insertAdjacentHTML('afterbegin', header);
            }
          } else {
            var cardHeader = elem.querySelector('.ib-card-front div.card-header');
            if (cardHeader) { cardHeader.remove(); }
          }
        }
  - name: footer
    title: Té peu
    type: checkbox
    value: false
    bind:
      getValue: |
        function(elem) {return elem.querySelector('.ib-card-front div.card-footer') !== null;}
      setValue: |
        function(elem, v) {
          if (v) {
            if (elem.querySelector('.ib-card-front div.card-footer')) {
              return;
            }
            elem.querySelector('.ib-card-front')?.insertAdjacentHTML('beforeend', '<div class="card-footer">Peu de targeta</div>');
          } else {
            var cardFooter = elem.querySelector('.ib-card-front div.card-footer');
            if (cardFooter) { cardFooter.remove(); }
          }
        }
  - name: bgFront
    title: Color de fons (davant)
    value: bg-white text-dark
    options:
      - l: Cap
        v: bg-white text-dark
      - l: Gris fluix
        v: bg-light text-dark
      - l: Gris
        v: bg-secondary text-white
      - l: Blau
        v: bg-primary text-white
      - l: Cian
        v: bg-info text-dark
      - l: Oscur
        v: bg-dark text-white
  - name: flip
    title: Es pot girar
    type: checkbox
    value: false
    bind:
      getValue: |
        function(elem) {return elem.classList.contains('ib-card-flip');} 
      setValue: |
        function(elem, v) {
          if(v) {
            if (elem.classList.contains('ib-card-flip')) {
              return;
            }
            elem.classList.add('ib-card-flip');
            const html = '<div class="card ib-card-back" data-face="back"><div class="card-body"><h5 class="card-title">Títol revers targeta</h5><p class="card-text">Text del revers de la targeta.</p></div></div>';
            elem.querySelector('.ib-card-front')?.insertAdjacentHTML('afterend', html);
          } else {
            elem.classList.remove('ib-card-flip');
            var cardBack = elem.querySelector('.ib-card-back');
            if (cardBack) { cardBack.remove(); }
          }
        }
  - name: bgBack
    title: Color de fons (revers)
    value: bg-light text-dark
    when: flip
    options:
      - l: Cap
        v: bg-white text-dark
      - l: Gris fluix
        v: bg-light text-dark
      - l: Gris
        v: bg-secondary text-white
      - l: Blau
        v: bg-primary text-white
      - l: Cian
        v: bg-info text-dark
      - l: Oscur
        v: bg-dark text-white
contextmenu:
  - actions: printable
author: Josep Mulet <pep.mulet@gmail.com>
nou: true
version: 2.5.0
icon: fa-solid fa-id-card

